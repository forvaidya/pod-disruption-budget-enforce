apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: pdb-webhook
  labels:
    app.kubernetes.io/name: pdb-webhook
    app.kubernetes.io/component: admission-controller
  annotations:
    cert-manager.io/inject-ca-from: webhook-system/pdb-webhook-tls
webhooks:
  - name: pdb-webhook-mutate.webhook-system.svc
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: pdb-webhook
        namespace: webhook-system
        path: /mutate
        port: 443
      # caBundle is injected by cert-manager
      caBundle: ""
    rules:
      # Validate namespace config completeness (CREATE and UPDATE)
      - operations: ["CREATE", "UPDATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["namespaces"]
        scope: "Cluster"
      # Auto-create PDBs for deployments and statefulsets (CREATE only)
      - operations: ["CREATE"]
        apiGroups: ["apps"]
        apiVersions: ["v1"]
        resources: ["deployments", "statefulsets"]
        scope: "*"
    failurePolicy: Fail
    sideEffects: None
    timeoutSeconds: 10
