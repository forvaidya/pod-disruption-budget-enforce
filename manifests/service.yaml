apiVersion: v1
kind: Service
metadata:
  name: pdb-webhook
  namespace: webhook-system
  labels:
    app.kubernetes.io/name: pdb-webhook
    app.kubernetes.io/component: admission-controller
spec:
  type: ClusterIP
  ports:
    - name: webhook
      port: 443
      targetPort: 8443
      protocol: TCP
  selector:
    app.kubernetes.io/name: pdb-webhook
