# Test case: Deployment without PDB (should be auto-created by mutating webhook)
#
# Expected result: ALLOWED - The mutating webhook will auto-create a PDB
# with minAvailable: 2 and maxUnavailable: 4 (or values from pdb-config ConfigMap)
#
# Run:
#   kubectl apply -f test/deployment-auto-pdb.yaml
#
# Verify:
#   kubectl get deployment nginx-auto-pdb
#   kubectl get pdb nginx-auto-pdb
#
# Expected output:
#   NAME             READY   UP-TO-DATE   AVAILABLE   AGE
#   nginx-auto-pdb   3/3     3            3           5s
#
#   NAME             MIN AVAILABLE   MAX UNAVAILABLE   ALLOWED DISRUPTIONS   AGE
#   nginx-auto-pdb   2               4                 2                     5s

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-auto-pdb
  namespace: default
  labels:
    app: nginx-auto-pdb
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-auto-pdb
  template:
    metadata:
      labels:
        app: nginx-auto-pdb
    spec:
      containers:
        - name: nginx
          image: nginx:1.26-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
