apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-without-pdb
  namespace: default
  labels:
    app: nginx-without-pdb
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-without-pdb
  template:
    metadata:
      labels:
        app: nginx-without-pdb
    spec:
      containers:
        - name: nginx
          image: nginx:1.26-alpine
          ports:
            - containerPort: 80
